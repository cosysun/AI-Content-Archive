<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900">
  <defs>
    <linearGradient id="step1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f472b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="step2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fb923c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="step3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="step4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="step5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="step6" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1400" height="900" fill="#0a0e1a"/>
  
  <!-- Title -->
  <text x="700" y="60" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff" text-anchor="middle">
    BMAD-METHOD 工作流程全景
  </text>
  <text x="700" y="95" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle">
    从需求到上线的智能化开发全流程
  </text>
  
  <!-- Step 1: Requirements Analysis -->
  <g id="step1">
    <rect x="50" y="150" width="350" height="100" rx="10" fill="url(#step1)" filter="url(#glow)"/>
    <text x="225" y="185" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">
      ① 需求分析
    </text>
    <text x="225" y="212" font-family="Arial, sans-serif" font-size="13" fill="#fce7f3" text-anchor="middle">
      🤖 产品经理Agent + 业务分析Agent
    </text>
    <text x="225" y="235" font-family="Arial, sans-serif" font-size="12" fill="#fce7f3" text-anchor="middle">
      • 自动解析用户故事 • PRD文档生成 • 优先级评估
    </text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M 400 200 L 470 200" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="435" y="195" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">2-3h</text>
  
  <!-- Step 2: Architecture Design -->
  <g id="step2">
    <rect x="470" y="150" width="350" height="100" rx="10" fill="url(#step2)" filter="url(#glow)"/>
    <text x="645" y="185" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">
      ② 架构设计
    </text>
    <text x="645" y="212" font-family="Arial, sans-serif" font-size="13" fill="#fff7ed" text-anchor="middle">
      🏗️ 架构师Agent + 技术专家Agent
    </text>
    <text x="645" y="235" font-family="Arial, sans-serif" font-size="12" fill="#fff7ed" text-anchor="middle">
      • 系统设计方案 • 技术栈选型 • 性能预估
    </text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M 820 200 L 890 200" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="855" y="195" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">1-2h</text>
  
  <!-- Step 3: Development -->
  <g id="step3">
    <rect x="890" y="150" width="350" height="100" rx="10" fill="url(#step3)" filter="url(#glow)"/>
    <text x="1065" y="185" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">
      ③ 代码开发
    </text>
    <text x="1065" y="212" font-family="Arial, sans-serif" font-size="13" fill="#fef3c7" text-anchor="middle">
      👨‍💻 开发Agent × 4 (并行)
    </text>
    <text x="1065" y="235" font-family="Arial, sans-serif" font-size="12" fill="#fef3c7" text-anchor="middle">
      • 前后端代码 • API实现 • 单元测试
    </text>
  </g>
  
  <!-- Arrow 3 (Down) -->
  <path d="M 1065 250 L 1065 320" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="1085" y="290" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">3-5h</text>
  
  <!-- Step 4: Testing -->
  <g id="step4">
    <rect x="890" y="320" width="350" height="100" rx="10" fill="url(#step4)" filter="url(#glow)"/>
    <text x="1065" y="355" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">
      ④ 测试验证
    </text>
    <text x="1065" y="382" font-family="Arial, sans-serif" font-size="13" fill="#d1fae5" text-anchor="middle">
      🔍 测试Agent + 安全Agent
    </text>
    <text x="1065" y="405" font-family="Arial, sans-serif" font-size="12" fill="#d1fae5" text-anchor="middle">
      • 自动化测试 • 性能测试 • 安全扫描
    </text>
  </g>
  
  <!-- Arrow 4 -->
  <path d="M 890 370 L 820 370" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="855" y="365" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">1-2h</text>
  
  <!-- Step 5: Deployment -->
  <g id="step5">
    <rect x="470" y="320" width="350" height="100" rx="10" fill="url(#step5)" filter="url(#glow)"/>
    <text x="645" y="355" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">
      ⑤ 部署上线
    </text>
    <text x="645" y="382" font-family="Arial, sans-serif" font-size="13" fill="#dbeafe" text-anchor="middle">
      🚀 DevOps Agent + 运维Agent
    </text>
    <text x="645" y="405" font-family="Arial, sans-serif" font-size="12" fill="#dbeafe" text-anchor="middle">
      • CI/CD流水线 • 灰度发布 • 环境配置
    </text>
  </g>
  
  <!-- Arrow 5 -->
  <path d="M 470 370 L 400 370" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="435" y="365" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">30m</text>
  
  <!-- Step 6: Monitoring -->
  <g id="step6">
    <rect x="50" y="320" width="350" height="100" rx="10" fill="url(#step6)" filter="url(#glow)"/>
    <text x="225" y="355" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">
      ⑥ 监控反馈
    </text>
    <text x="225" y="382" font-family="Arial, sans-serif" font-size="13" fill="#e9d5ff" text-anchor="middle">
      📊 监控Agent + 分析Agent
    </text>
    <text x="225" y="405" font-family="Arial, sans-serif" font-size="12" fill="#e9d5ff" text-anchor="middle">
      • 实时监控 • 性能分析 • 异常告警
    </text>
  </g>
  
  <!-- Feedback Arrow -->
  <path d="M 225 320 L 225 250" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  <text x="245" y="290" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">持续优化</text>
  
  <!-- Center: Party Mode Coordination -->
  <ellipse cx="700" cy="285" rx="180" ry="90" fill="#1e293b" stroke="#475569" stroke-width="3" stroke-dasharray="8,4"/>
  <text x="700" y="270" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">
    🎉 Party Mode
  </text>
  <text x="700" y="295" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">
    多Agent实时协作
  </text>
  <text x="700" y="315" font-family="Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">
    自适应调度 | 智能决策 | 知识共享
  </text>
  
  <!-- Timeline -->
  <rect x="50" y="500" width="1190" height="80" rx="10" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <text x="700" y="530" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">
    ⏱️ 总体时间线
  </text>
  <text x="700" y="560" font-family="Arial, sans-serif" font-size="15" fill="#94a3b8" text-anchor="middle">
    传统方式: 2-3周 → BMAD方式: 8-12小时 (效率提升 400%)
  </text>
  
  <!-- Agent Pool -->
  <rect x="50" y="620" width="1190" height="220" rx="10" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <text x="700" y="655" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">
    🤖 Agent能力池 (12+ 专业Agent)
  </text>
  
  <g id="agent-grid">
    <!-- Row 1 -->
    <rect x="80" y="680" width="160" height="50" rx="6" fill="#334155"/>
    <text x="160" y="710" font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0" text-anchor="middle">📋 产品经理</text>
    
    <rect x="260" y="680" width="160" height="50" rx="6" fill="#334155"/>
    <text x="340" y="710" font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0" text-anchor="middle">🏗️ 架构师</text>
    
    <rect x="440" y="680" width="160" height="50" rx="6" fill="#334155"/>
    <text x="520" y="710" font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0" text-anchor="middle">👨‍💻 前端开发</text>
    
    <rect x="620" y="680" width="160" height="50" rx="6" fill="#334155"/>
    <text x="700" y="710" font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0" text-anchor="middle">⚙️ 后端开发</text>
    
    <rect x="800" y="680" width="160" height="50" rx="6" fill="#334155"/>
    <text x="880" y="710" font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0" text-anchor="middle">🔍 测试工程师</text>
    
    <rect x="980" y="680" width="160" height="50" rx="6" fill="#334155"/>
    <text x="1060" y="710" font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0" text-anchor="middle">🛡️ 安全专家</text>
    
    <!-- Row 2 -->
    <rect x="80" y="750" width="160" height="50" rx="6" fill="#334155"/>
    <text x="160" y="780" font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0" text-anchor="middle">🚀 DevOps</text>
    
    <rect x="260" y="750" width="160" height="50" rx="6" fill="#334155"/>
    <text x="340" y="780" font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0" text-anchor="middle">📊 数据分析</text>
    
    <rect x="440" y="750" width="160" height="50" rx="6" fill="#334155"/>
    <text x="520" y="780" font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0" text-anchor="middle">🎨 UI/UX设计</text>
    
    <rect x="620" y="750" width="160" height="50" rx="6" fill="#334155"/>
    <text x="700" y="780" font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0" text-anchor="middle">📝 技术文档</text>
    
    <rect x="800" y="750" width="160" height="50" rx="6" fill="#334155"/>
    <text x="880" y="780" font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0" text-anchor="middle">🔧 运维监控</text>
    
    <rect x="980" y="750" width="160" height="50" rx="6" fill="#334155"/>
    <text x="1060" y="780" font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0" text-anchor="middle">🎯 业务分析</text>
  </g>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#64748b" />
    </marker>
  </defs>
</svg>