<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="#0f172a"/>
  
  <!-- Title -->
  <text x="600" y="50" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff" text-anchor="middle">
    BMAD-METHOD 架构体系
  </text>
  
  <!-- Core Layer -->
  <rect x="400" y="100" width="400" height="120" rx="10" fill="url(#grad1)" filter="url(#shadow)"/>
  <text x="600" y="145" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">
    🧠 AI智能引擎
  </text>
  <text x="600" y="175" font-family="Arial, sans-serif" font-size="14" fill="#e2e8f0" text-anchor="middle">
    Party Mode 多Agent协作
  </text>
  <text x="600" y="200" font-family="Arial, sans-serif" font-size="14" fill="#e2e8f0" text-anchor="middle">
    规模自适应智能 | 动态工作流编排
  </text>
  
  <!-- Agent Layer -->
  <g id="agents">
    <!-- Product Manager -->
    <rect x="50" y="280" width="150" height="100" rx="8" fill="url(#grad2)" filter="url(#shadow)"/>
    <text x="125" y="315" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">
      📋 产品经理
    </text>
    <text x="125" y="340" font-family="Arial, sans-serif" font-size="12" fill="#fce7f3" text-anchor="middle">
      需求分析
    </text>
    <text x="125" y="360" font-family="Arial, sans-serif" font-size="12" fill="#fce7f3" text-anchor="middle">
      用户故事
    </text>
    
    <!-- Architect -->
    <rect x="230" y="280" width="150" height="100" rx="8" fill="url(#grad2)" filter="url(#shadow)"/>
    <text x="305" y="315" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">
      🏗️ 架构师
    </text>
    <text x="305" y="340" font-family="Arial, sans-serif" font-size="12" fill="#fce7f3" text-anchor="middle">
      系统设计
    </text>
    <text x="305" y="360" font-family="Arial, sans-serif" font-size="12" fill="#fce7f3" text-anchor="middle">
      技术选型
    </text>
    
    <!-- Developer -->
    <rect x="410" y="280" width="150" height="100" rx="8" fill="url(#grad2)" filter="url(#shadow)"/>
    <text x="485" y="315" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">
      👨‍💻 开发工程师
    </text>
    <text x="485" y="340" font-family="Arial, sans-serif" font-size="12" fill="#fce7f3" text-anchor="middle">
      代码实现
    </text>
    <text x="485" y="360" font-family="Arial, sans-serif" font-size="12" fill="#fce7f3" text-anchor="middle">
      单元测试
    </text>
    
    <!-- QA Engineer -->
    <rect x="590" y="280" width="150" height="100" rx="8" fill="url(#grad2)" filter="url(#shadow)"/>
    <text x="665" y="315" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">
      🔍 测试工程师
    </text>
    <text x="665" y="340" font-family="Arial, sans-serif" font-size="12" fill="#fce7f3" text-anchor="middle">
      质量保证
    </text>
    <text x="665" y="360" font-family="Arial, sans-serif" font-size="12" fill="#fce7f3" text-anchor="middle">
      自动化测试
    </text>
    
    <!-- DevOps -->
    <rect x="770" y="280" width="150" height="100" rx="8" fill="url(#grad2)" filter="url(#shadow)"/>
    <text x="845" y="315" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">
      🚀 DevOps
    </text>
    <text x="845" y="340" font-family="Arial, sans-serif" font-size="12" fill="#fce7f3" text-anchor="middle">
      持续集成
    </text>
    <text x="845" y="360" font-family="Arial, sans-serif" font-size="12" fill="#fce7f3" text-anchor="middle">
      自动部署
    </text>
    
    <!-- Security -->
    <rect x="950" y="280" width="150" height="100" rx="8" fill="url(#grad2)" filter="url(#shadow)"/>
    <text x="1025" y="315" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">
      🛡️ 安全专家
    </text>
    <text x="1025" y="340" font-family="Arial, sans-serif" font-size="12" fill="#fce7f3" text-anchor="middle">
      安全审计
    </text>
    <text x="1025" y="360" font-family="Arial, sans-serif" font-size="12" fill="#fce7f3" text-anchor="middle">
      漏洞扫描
    </text>
  </g>
  
  <!-- Workflow Layer -->
  <rect x="250" y="430" width="700" height="100" rx="10" fill="url(#grad3)" filter="url(#shadow)"/>
  <text x="600" y="465" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">
    ⚡ 34+ 智能工作流
  </text>
  <text x="600" y="495" font-family="Arial, sans-serif" font-size="14" fill="#e0f2fe" text-anchor="middle">
    需求分析 → 设计评审 → 代码开发 → 测试验证 → 部署上线 → 监控反馈
  </text>
  <text x="600" y="515" font-family="Arial, sans-serif" font-size="14" fill="#e0f2fe" text-anchor="middle">
    动态编排 | 自适应调整 | 并行执行
  </text>
  
  <!-- Output Layer -->
  <g id="outputs">
    <rect x="150" y="590" width="200" height="80" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="250" y="620" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">
      📊 交付物
    </text>
    <text x="250" y="645" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">
      需求文档 | 设计方案
    </text>
    <text x="250" y="662" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">
      代码 | 测试报告
    </text>
    
    <rect x="400" y="590" width="200" height="80" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="500" y="620" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">
      📈 过程数据
    </text>
    <text x="500" y="645" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">
      进度追踪 | 质量指标
    </text>
    <text x="500" y="662" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">
      性能分析 | 风险预警
    </text>
    
    <rect x="650" y="590" width="200" height="80" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="750" y="620" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">
      🎓 知识沉淀
    </text>
    <text x="750" y="645" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">
      最佳实践 | 经验总结
    </text>
    <text x="750" y="662" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">
      问题库 | 解决方案
    </text>
  </g>
  
  <!-- Arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#64748b" />
    </marker>
  </defs>
  
  <!-- Core to Agents -->
  <line x1="600" y1="220" x2="125" y2="280" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="600" y1="220" x2="305" y2="280" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="600" y1="220" x2="485" y2="280" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="600" y1="220" x2="665" y2="280" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="600" y1="220" x2="845" y2="280" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="600" y1="220" x2="1025" y2="280" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Agents to Workflow -->
  <line x1="485" y1="380" x2="600" y2="430" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Workflow to Outputs -->
  <line x1="450" y1="530" x2="250" y2="590" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="600" y1="530" x2="500" y2="590" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="750" y1="530" x2="750" y2="590" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Stats -->
  <rect x="900" y="600" width="250" height="160" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <text x="1025" y="630" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">
    📊 项目数据
  </text>
  <text x="1025" y="660" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">
    ⭐ Stars: 37,180
  </text>
  <text x="1025" y="685" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">
    🔱 Forks: 4,618
  </text>
  <text x="1025" y="710" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">
    🤖 Agents: 12+
  </text>
  <text x="1025" y="735" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">
    ⚡ Workflows: 34+
  </text>
  
  <!-- Footer -->
  <text x="600" y="780" font-family="Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">
    github.com/bmad-code-org/BMAD-METHOD | MIT License
  </text>
</svg>