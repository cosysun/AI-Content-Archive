<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="oldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#94a3b8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#64748b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="newGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="700" fill="#0f172a"/>
  
  <!-- Title -->
  <text x="600" y="50" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">
    传统敏捷 vs BMAD智能敏捷对比
  </text>
  
  <!-- Left Side: Traditional Agile -->
  <text x="250" y="100" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#94a3b8" text-anchor="middle">
    ⚙️ 传统敏捷开发
  </text>
  
  <!-- Right Side: BMAD -->
  <text x="850" y="100" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#a78bfa" text-anchor="middle">
    🚀 BMAD智能敏捷
  </text>
  
  <!-- Divider -->
  <line x1="550" y1="120" x2="550" y2="680" stroke="#334155" stroke-width="2" stroke-dasharray="5,5"/>
  
  <!-- VS Badge -->
  <circle cx="600" cy="400" r="40" fill="#1e293b" stroke="#475569" stroke-width="3"/>
  <text x="600" y="410" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">
    VS
  </text>
  
  <!-- Comparison Items -->
  
  <!-- 1. Planning -->
  <g id="planning">
    <rect x="50" y="140" width="400" height="60" rx="8" fill="url(#oldGrad)" filter="url(#shadow)"/>
    <text x="250" y="165" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">
      📋 需求规划
    </text>
    <text x="250" y="190" font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0" text-anchor="middle">
      人工评审 | 2-3天 | 依赖经验
    </text>
    
    <rect x="650" y="140" width="400" height="60" rx="8" fill="url(#newGrad)" filter="url(#shadow)"/>
    <text x="850" y="165" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">
      🤖 AI智能规划
    </text>
    <text x="850" y="190" font-family="Arial, sans-serif" font-size="13" fill="#e0e7ff" text-anchor="middle">
      自动分析 | 1-2小时 | 数据驱动
    </text>
  </g>
  
  <!-- 2. Development -->
  <g id="development">
    <rect x="50" y="220" width="400" height="60" rx="8" fill="url(#oldGrad)" filter="url(#shadow)"/>
    <text x="250" y="245" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">
      👨‍💻 开发过程
    </text>
    <text x="250" y="270" font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0" text-anchor="middle">
      单线程 | 重复劳动 | 知识孤岛
    </text>
    
    <rect x="650" y="220" width="400" height="60" rx="8" fill="url(#newGrad)" filter="url(#shadow)"/>
    <text x="850" y="245" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">
      🎯 多Agent协作
    </text>
    <text x="850" y="270" font-family="Arial, sans-serif" font-size="13" fill="#e0e7ff" text-anchor="middle">
      并行执行 | 自动化 | 知识共享
    </text>
  </g>
  
  <!-- 3. Testing -->
  <g id="testing">
    <rect x="50" y="300" width="400" height="60" rx="8" fill="url(#oldGrad)" filter="url(#shadow)"/>
    <text x="250" y="325" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">
      🔍 质量保证
    </text>
    <text x="250" y="350" font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0" text-anchor="middle">
      人工测试 | 覆盖率60% | 周期长
    </text>
    
    <rect x="650" y="300" width="400" height="60" rx="8" fill="url(#newGrad)" filter="url(#shadow)"/>
    <text x="850" y="325" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">
      ⚡ 智能测试
    </text>
    <text x="850" y="350" font-family="Arial, sans-serif" font-size="13" fill="#e0e7ff" text-anchor="middle">
      自动化测试 | 覆盖率90%+ | 实时反馈
    </text>
  </g>
  
  <!-- 4. Deployment -->
  <g id="deployment">
    <rect x="50" y="380" width="400" height="60" rx="8" fill="url(#oldGrad)" filter="url(#shadow)"/>
    <text x="250" y="405" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">
      🚢 部署发布
    </text>
    <text x="250" y="430" font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0" text-anchor="middle">
      手动操作 | 易出错 | 发布窗口固定
    </text>
    
    <rect x="650" y="380" width="400" height="60" rx="8" fill="url(#newGrad)" filter="url(#shadow)"/>
    <text x="850" y="405" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">
      🎯 智能部署
    </text>
    <text x="850" y="430" font-family="Arial, sans-serif" font-size="13" fill="#e0e7ff" text-anchor="middle">
      一键部署 | 自动回滚 | 随时发布
    </text>
  </g>
  
  <!-- 5. Scaling -->
  <g id="scaling">
    <rect x="50" y="460" width="400" height="60" rx="8" fill="url(#oldGrad)" filter="url(#shadow)"/>
    <text x="250" y="485" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">
      📊 团队规模
    </text>
    <text x="250" y="510" font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0" text-anchor="middle">
      线性扩展 | 沟通成本高 | 协作困难
    </text>
    
    <rect x="650" y="460" width="400" height="60" rx="8" fill="url(#newGrad)" filter="url(#shadow)"/>
    <text x="850" y="485" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">
      🎨 规模自适应
    </text>
    <text x="850" y="510" font-family="Arial, sans-serif" font-size="13" fill="#e0e7ff" text-anchor="middle">
      智能调度 | 透明协作 | 高效扩展
    </text>
  </g>
  
  <!-- 6. Knowledge -->
  <g id="knowledge">
    <rect x="50" y="540" width="400" height="60" rx="8" fill="url(#oldGrad)" filter="url(#shadow)"/>
    <text x="250" y="565" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">
      📚 知识管理
    </text>
    <text x="250" y="590" font-family="Arial, sans-serif" font-size="13" fill="#e2e8f0" text-anchor="middle">
      分散文档 | 难以传承 | 查找困难
    </text>
    
    <rect x="650" y="540" width="400" height="60" rx="8" fill="url(#newGrad)" filter="url(#shadow)"/>
    <text x="850" y="565" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">
      🧠 智能知识库
    </text>
    <text x="850" y="590" font-family="Arial, sans-serif" font-size="13" fill="#e0e7ff" text-anchor="middle">
      自动沉淀 | 实时推荐 | 持续学习
    </text>
  </g>
  
  <!-- Bottom Stats -->
  <rect x="50" y="620" width="400" height="50" rx="8" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <text x="250" y="653" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#94a3b8" text-anchor="middle">
    效率提升: 基线
  </text>
  
  <rect x="650" y="620" width="400" height="50" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="3"/>
  <text x="850" y="653" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#a78bfa" text-anchor="middle">
    效率提升: 300% - 500% ⚡
  </text>
</svg>