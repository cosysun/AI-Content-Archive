<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="barGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="barGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="barGrad3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="barGrad4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="#0f172a"/>
  
  <!-- Title -->
  <text x="600" y="50" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">
    📊 BMAD-METHOD 项目数据统计
  </text>
  
  <!-- GitHub Stats Card -->
  <rect x="50" y="90" width="550" height="280" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2" filter="url(#shadow)"/>
  <text x="325" y="130" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">
    🌟 GitHub热度指标
  </text>
  
  <!-- Stars -->
  <g id="stars">
    <rect x="80" y="160" width="220" height="80" rx="8" fill="url(#barGrad1)"/>
    <text x="190" y="190" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff" text-anchor="middle">
      37,180
    </text>
    <text x="190" y="220" font-family="Arial, sans-serif" font-size="14" fill="#e9d5ff" text-anchor="middle">
      ⭐ Stars
    </text>
  </g>
  
  <!-- Forks -->
  <g id="forks">
    <rect x="330" y="160" width="220" height="80" rx="8" fill="url(#barGrad2)"/>
    <text x="440" y="190" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff" text-anchor="middle">
      4,618
    </text>
    <text x="440" y="220" font-family="Arial, sans-serif" font-size="14" fill="#d1fae5" text-anchor="middle">
      🔱 Forks
    </text>
  </g>
  
  <!-- Contributors -->
  <g id="contributors">
    <rect x="80" y="260" width="220" height="80" rx="8" fill="url(#barGrad3)"/>
    <text x="190" y="290" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff" text-anchor="middle">
      200+
    </text>
    <text x="190" y="320" font-family="Arial, sans-serif" font-size="14" fill="#dbeafe" text-anchor="middle">
      👥 贡献者
    </text>
  </g>
  
  <!-- Issues -->
  <g id="issues">
    <rect x="330" y="260" width="220" height="80" rx="8" fill="url(#barGrad4)"/>
    <text x="440" y="290" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff" text-anchor="middle">
      1,200+
    </text>
    <text x="440" y="320" font-family="Arial, sans-serif" font-size="14" fill="#fce7f3" text-anchor="middle">
      💬 Issues/PRs
    </text>
  </g>
  
  <!-- Technical Stats Card -->
  <rect x="650" y="90" width="500" height="280" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2" filter="url(#shadow)"/>
  <text x="900" y="130" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">
    ⚙️ 技术规模
  </text>
  
  <!-- Agents Count -->
  <g>
    <circle cx="770" cy="200" r="50" fill="url(#barGrad1)" filter="url(#shadow)"/>
    <text x="770" y="205" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">
      12+
    </text>
    <text x="770" y="270" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">
      🤖 专业Agent
    </text>
  </g>
  
  <!-- Workflows -->
  <g>
    <circle cx="900" cy="200" r="50" fill="url(#barGrad2)" filter="url(#shadow)"/>
    <text x="900" y="205" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">
      34+
    </text>
    <text x="900" y="270" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">
      ⚡ 智能工作流
    </text>
  </g>
  
  <!-- Code Lines -->
  <g>
    <circle cx="1030" cy="200" r="50" fill="url(#barGrad3)" filter="url(#shadow)"/>
    <text x="1030" y="200" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">
      50K+
    </text>
    <text x="1030" y="218" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">
      Lines
    </text>
    <text x="1030" y="270" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">
      📝 代码量
    </text>
  </g>
  
  <!-- Languages -->
  <rect x="680" y="300" width="440" height="50" rx="8" fill="#334155"/>
  <text x="900" y="332" font-family="Arial, sans-serif" font-size="14" fill="#e2e8f0" text-anchor="middle">
    💻 主要语言: JavaScript (68%) | Python (22%) | TypeScript (10%)
  </text>
  
  <!-- Growth Chart -->
  <rect x="50" y="400" width="1100" height="350" rx="12" fill="#1e293b" stroke="#334155" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="440" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">
    📈 Star增长趋势 (2024-2025)
  </text>
  
  <!-- Chart Grid -->
  <g id="grid">
    <line x1="100" y1="480" x2="100" y2="700" stroke="#334155" stroke-width="2"/>
    <line x1="100" y1="700" x2="1100" y2="700" stroke="#334155" stroke-width="2"/>
    
    <!-- Y-axis labels -->
    <text x="85" y="485" font-family="Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="end">40K</text>
    <line x1="95" y1="480" x2="1100" y2="480" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>
    
    <text x="85" y="540" font-family="Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="end">30K</text>
    <line x1="95" y1="535" x2="1100" y2="535" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>
    
    <text x="85" y="595" font-family="Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="end">20K</text>
    <line x1="95" y1="590" x2="1100" y2="590" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>
    
    <text x="85" y="650" font-family="Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="end">10K</text>
    <line x1="95" y1="645" x2="1100" y2="645" stroke="#334155" stroke-width="1" stroke-dasharray="3,3"/>
    
    <text x="85" y="705" font-family="Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="end">0</text>
  </g>
  
  <!-- Growth Line -->
  <path d="M 100 680 Q 250 650, 400 620 T 700 560 T 1000 485 L 1100 480" 
        stroke="url(#barGrad1)" stroke-width="4" fill="none" filter="url(#shadow)"/>
  
  <!-- Data Points -->
  <circle cx="100" cy="680" r="6" fill="#a78bfa"/>
  <circle cx="250" cy="650" r="6" fill="#a78bfa"/>
  <circle cx="400" cy="620" r="6" fill="#a78bfa"/>
  <circle cx="550" cy="590" r="6" fill="#a78bfa"/>
  <circle cx="700" cy="560" r="6" fill="#a78bfa"/>
  <circle cx="850" cy="520" r="6" fill="#a78bfa"/>
  <circle cx="1000" cy="485" r="6" fill="#a78bfa"/>
  <circle cx="1100" cy="480" r="8" fill="#a78bfa" stroke="#ffffff" stroke-width="2"/>
  
  <!-- X-axis labels -->
  <text x="100" y="720" font-family="Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">2024/01</text>
  <text x="250" y="720" font-family="Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">2024/03</text>
  <text x="400" y="720" font-family="Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">2024/05</text>
  <text x="550" y="720" font-family="Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">2024/07</text>
  <text x="700" y="720" font-family="Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">2024/09</text>
  <text x="850" y="720" font-family="Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">2024/11</text>
  <text x="1000" y="720" font-family="Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">2025/01</text>
  <text x="1100" y="720" font-family="Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">2025/02</text>
  
  <!-- Current Value Highlight -->
  <rect x="1020" y="450" width="110" height="40" rx="6" fill="#8b5cf6"/>
  <text x="1075" y="475" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">
    37,180 ⭐
  </text>
  
  <!-- Growth Rate -->
  <text x="600" y="770" font-family="Arial, sans-serif" font-size="14" fill="#34d399" text-anchor="middle">
    📊 年增长率: +285% | 日均新增: ~120 Stars
  </text>
</svg>